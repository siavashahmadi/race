# Docker Compose defines your services (containers) and how they connect.
# Run with: docker compose up --build
# Stop with: docker compose down

services:
  # Public demo — pre-baked AI results, no API key needed
  race-demo:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DEMO_MODE=true
      - PRINT_BASE_URL=http://localhost:3000
    restart: unless-stopped

  # Full version — live AI, requires API key
